<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hey! Burgers — o pedido de todo mundo</title>
  <meta name="description" content="Hey! Burgers — hamburgueria de delivery em São Carlos-SP. Peça pelo cardápio digital, iFood ou WhatsApp. Terça a domingo.">
  <link rel="canonical" href="https://heyburgers.com.br">
  <link rel="icon" href="assets/favicon.png" type="image/png">

  <!-- Preload LCP image -->
  <link rel="preload" as="image" href="assets/burger-01.webp" fetchpriority="high" type="image/webp">

  <!-- Preload critical fonts to avoid CLS from font swap -->
  <link rel="preload" href="fonts/GraphikXXXXCondensed-Bold.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="fonts/Graphik-Regular.otf" as="font" type="font/otf" crossorigin>

  <!-- Critical CSS inline -->
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    html{background:#D71920;}
    body{min-height:100dvh;overflow-x:hidden;}
    #root{min-height:100dvh;}
    .page-loader{
      position:fixed;inset:0;z-index:1000;
      background:#D71920;
      display:flex;align-items:center;justify-content:center;
      animation:loaderOut .5s cubic-bezier(.2,.8,.2,1) 1.4s both;
      pointer-events:none;
    }
    .page-loader-logo{width:300px;color:#F2E9D6;}
    @keyframes loaderOut{from{opacity:1;}to{opacity:0;}}
    /* Reserve space for logo to prevent CLS */
    .home-logo{width:480px;max-width:88%;margin:0;}
    .home-logo img{display:block;width:100%;height:auto;}
  </style>

  <!-- Full stylesheet -->
  <link rel="stylesheet" href="styles.css">

  <!-- React + ReactDOM (self-hosted to avoid CDN failures; defer = non-blocking, executes in order after parse) -->
  <script defer src="vendor/react.production.min.js"></script>
  <script defer src="vendor/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;color:#F2E9D6;font-family:system-ui,sans-serif;">
      Este site precisa de JavaScript ativado para funcionar.
    </div>
  </noscript>

  <script defer src="dist/components.js"></script>
  <script defer src="dist/tweaks-panel.js"></script>
  <script defer src="dist/screens.js"></script>
  <script defer src="dist/app.js"></script>

  <!-- Fallback: se o app não montar (ex.: falha ao carregar scripts), mostra aviso em vez de tela vazia -->
  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="position:fixed;inset:0;display:flex;flex-direction:column;gap:12px;' +
            'align-items:center;justify-content:center;padding:24px;text-align:center;' +
            'color:#F2E9D6;font-family:system-ui,sans-serif;">' +
            '<p style="font-size:18px;margin:0;">Não foi possível carregar o site.</p>' +
            '<p style="font-size:14px;margin:0;opacity:.85;">Verifique sua conexão e tente novamente.</p>' +
            '<button onclick="location.reload()" style="margin-top:8px;padding:10px 20px;' +
            'border:2px solid #F2E9D6;background:transparent;color:#F2E9D6;border-radius:8px;' +
            'font-size:15px;cursor:pointer;">Recarregar</button>' +
            '</div>';
        }
      }, 4000);
    });
  </script>
</body>
</html>
